<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="/Jarviss/manifest.json">
<title>J.A.R.V.I.S</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0b0f1a;
    color: #90e0ff;
    font-family: 'Courier New', monospace;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .header {
    background: #0d1422;
    border-bottom: 1px solid #1a2a3a;
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 14px;
    flex-shrink: 0;
  }

  .arc-reactor { width: 40px; height: 40px; flex-shrink: 0; }

  .header-text h1 {
    font-size: 16px;
    font-weight: bold;
    color: #00d4ff;
    letter-spacing: 3px;
  }

  .header-text p { font-size: 9px; color: #1a4a6a; letter-spacing: 2px; }

  .status {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: #00ff88;
  }

  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #00ff88;
    animation: pulse 1.5s infinite;
  }

  @keyframes pulse {
    0%,100% { opacity:1; box-shadow: 0 0 6px #00ff88; }
    50% { opacity:0.4; box-shadow:none; }
  }

  /* ── LOGIN SCREEN ── */
  #setup-screen {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .login-card {
    background: #0d1422;
    border: 1px solid #1a2a3a;
    border-radius: 16px;
    padding: 48px 40px 36px;
    max-width: 400px;
    width: 100%;
    text-align: center;
  }

  .login-card h2 {
    color: #00d4ff;
    font-size: 22px;
    letter-spacing: 4px;
    margin: 16px 0 4px;
  }

  .login-card .sub {
    color: #1a4a6a;
    font-size: 10px;
    letter-spacing: 2px;
    margin-bottom: 36px;
  }

  .input-wrap {
    position: relative;
    margin-bottom: 6px;
  }

  .input-wrap input {
    width: 100%;
    background: #0b1220;
    border: 1px solid #1a2a3a;
    border-radius: 8px;
    padding: 14px 48px 14px 18px;
    color: #00ff88;
    font-family: 'Courier New', monospace;
    font-size: 15px;
    letter-spacing: 3px;
    outline: none;
    transition: border-color 0.2s;
  }

  .input-wrap input:focus {
    border-color: #00d4ff;
  }

  .input-wrap input.error {
    border-color: #ff4444;
    animation: shake 0.35s ease;
  }

  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20% { transform: translateX(-8px); }
    60% { transform: translateX(8px); }
  }

  .eye-btn {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    cursor: pointer;
    color: #1a5a7a;
    font-size: 16px;
    padding: 4px;
    transition: color 0.2s;
  }

  .eye-btn:hover { color: #00d4ff; }

  .error-msg {
    color: #ff4444;
    font-size: 10px;
    letter-spacing: 2px;
    min-height: 18px;
    margin-bottom: 20px;
    text-align: left;
    padding-left: 4px;
    display: none;
  }

  .btn-access {
    width: 100%;
    background: #0d1e30;
    border: 1px solid #00d4ff;
    border-radius: 8px;
    padding: 14px;
    color: #00d4ff;
    font-family: 'Courier New', monospace;
    font-size: 13px;
    font-weight: bold;
    cursor: pointer;
    letter-spacing: 3px;
    transition: all 0.2s;
  }

  .btn-access:hover:not(:disabled) {
    background: #132840;
    box-shadow: 0 0 20px rgba(0,212,255,0.15);
  }

  .btn-access:disabled {
    opacity: 0.6;
    cursor: not-allowed;
  }

  /* ── CHAT SCREEN ── */
  #chat-screen {
    flex: 1;
    display: none;
    flex-direction: column;
    overflow: hidden;
  }

  .chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scrollbar-width: thin;
    scrollbar-color: #141e2e transparent;
  }

  .chat-messages::-webkit-scrollbar { width: 4px; }
  .chat-messages::-webkit-scrollbar-thumb { background: #141e2e; border-radius: 4px; }

  .welcome {
    background: #0d1422;
    border: 1px solid #1a2a3a;
    border-radius: 14px;
    padding: 40px 20px;
    text-align: center;
  }

  .welcome h2 {
    color: #00d4ff;
    font-size: 22px;
    letter-spacing: 3px;
    margin: 16px 0 6px;
  }

  .welcome p { color: #1a6a8a; font-size: 11px; margin-bottom: 24px; letter-spacing: 1px; }

  .suggestions {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    max-width: 400px;
    margin: 0 auto;
  }

  .sug-btn {
    background: #0b1220;
    border: 1px solid #1a2a3a;
    border-radius: 6px;
    padding: 10px 12px;
    color: #1a7a9a;
    font-family: 'Courier New', monospace;
    font-size: 11px;
    cursor: pointer;
    text-align: left;
    transition: all 0.2s;
  }

  .sug-btn:hover { border-color: #00d4ff; color: #00d4ff; }

  .msg-user { display: flex; justify-content: flex-end; }
  .msg-user-inner { max-width: 75%; }

  .msg-user-name {
    font-size: 9px; color: #1a4a6a;
    text-align: right; margin-bottom: 4px; letter-spacing: 1px;
  }

  .msg-user-bubble {
    background: #0d1e30;
    border: 1px solid #1a3a5a;
    border-radius: 12px 12px 2px 12px;
    padding: 12px 16px;
    color: #a0d8f0;
    font-size: 13px;
    line-height: 1.6;
    word-break: break-word;
  }

  .msg-jarvis { display: flex; gap: 12px; align-items: flex-start; }
  .jarvis-avatar { width: 34px; height: 34px; flex-shrink: 0; margin-top: 4px; }
  .msg-jarvis-inner { flex: 1; }

  .msg-jarvis-name {
    font-size: 9px; color: #00d4ff;
    margin-bottom: 4px; letter-spacing: 1px; font-weight: bold;
  }

  .msg-jarvis-bubble {
    background: #0d1220;
    border: 1px solid #1a2a3a;
    border-radius: 2px 12px 12px 12px;
    padding: 12px 16px;
    color: #90e0ff;
    font-size: 13px;
    line-height: 1.7;
    word-break: break-word;
    white-space: pre-wrap;
  }

  .msg-time { font-size: 9px; color: #1a2a3a; margin-top: 4px; }

  .msg-image {
    max-width: 100%;
    border-radius: 8px;
    border: 1px solid #1a3a5a;
    margin-top: 10px;
    display: block;
  }

  .img-progress {
    background: #0a1422;
    border: 1px solid #1a3a5a;
    border-radius: 8px;
    padding: 14px;
    margin-top: 10px;
  }

  .img-progress-title {
    color: #00d4ff;
    font-size: 11px;
    font-weight: bold;
    margin-bottom: 8px;
    letter-spacing: 1px;
  }

  .img-progress-bar-bg {
    background: #0b1220;
    border-radius: 4px;
    height: 6px;
    margin-bottom: 6px;
    overflow: hidden;
  }

  .img-progress-bar {
    height: 100%;
    background: #00d4ff;
    border-radius: 4px;
    transition: width 0.5s ease;
    width: 0%;
  }

  .img-progress-text { font-size: 10px; color: #1a5a7a; }
  .img-timer { font-size: 18px; font-weight: bold; color: #00ff88; margin-top: 8px; }

  .typing-indicator { display: flex; gap: 12px; align-items: center; }

  .typing-dots {
    display: flex; gap: 4px;
    padding: 12px 16px;
    background: #0d1220;
    border: 1px solid #1a2a3a;
    border-radius: 12px;
  }

  .typing-dots span {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #00d4ff;
    animation: bounce 1.2s infinite;
  }

  .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%,80%,100% { transform:translateY(0); opacity:0.4; }
    40% { transform:translateY(-6px); opacity:1; }
  }

  .input-area {
    background: #0d1220;
    border-top: 1px solid #141e2e;
    padding: 14px 16px;
    flex-shrink: 0;
  }

  .input-box {
    display: flex;
    gap: 10px;
    align-items: flex-end;
    background: #0b1220;
    border: 1px solid #1a2a3a;
    border-radius: 12px;
    padding: 8px 12px;
  }

  .input-prefix {
    color: #00d4ff;
    font-size: 14px;
    font-weight: bold;
    padding-bottom: 4px;
    flex-shrink: 0;
  }

  .input-box textarea {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: #00ff88;
    font-family: 'Courier New', monospace;
    font-size: 13px;
    resize: none;
    min-height: 24px;
    max-height: 120px;
    line-height: 1.5;
    padding: 4px 0;
  }

  .input-box textarea::placeholder { color: #1a3a5a; }

  .send-btn {
    background: #0d1e30;
    border: 1px solid #00d4ff;
    border-radius: 8px;
    width: 36px; height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: #00d4ff;
    font-size: 16px;
    flex-shrink: 0;
    transition: all 0.2s;
  }

  .send-btn:hover { background: #132840; }

  .input-hint {
    font-size: 9px;
    color: #1a2a3a;
    text-align: center;
    margin-top: 6px;
    letter-spacing: 1px;
  }

  .arc-svg { animation: rotate 4s linear infinite; transform-origin: center; }
  @keyframes rotate { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }

  @media (max-width: 480px) {
    .login-card { padding: 36px 24px 28px; }
    .suggestions { grid-template-columns: 1fr; }
    .msg-user-inner { max-width: 88%; }
    .header-text h1 { font-size: 13px; }
  }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <svg class="arc-reactor" viewBox="0 0 40 40">
    <circle cx="20" cy="20" r="18" stroke="#00d4ff" stroke-width="1" fill="none" opacity="0.4"/>
    <circle cx="20" cy="20" r="13" stroke="#00d4ff" stroke-width="0.8" fill="none" opacity="0.6"/>
    <g class="arc-svg">
      <line x1="20" y1="2" x2="20" y2="7" stroke="#00d4ff" stroke-width="2"/>
      <line x1="20" y1="33" x2="20" y2="38" stroke="#00d4ff" stroke-width="2"/>
      <line x1="2" y1="20" x2="7" y2="20" stroke="#00d4ff" stroke-width="2"/>
      <line x1="33" y1="20" x2="38" y2="20" stroke="#00d4ff" stroke-width="2"/>
      <line x1="6" y1="6" x2="10" y2="10" stroke="#00d4ff" stroke-width="1.5"/>
      <line x1="30" y1="30" x2="34" y2="34" stroke="#00d4ff" stroke-width="1.5"/>
      <line x1="34" y1="6" x2="30" y2="10" stroke="#00d4ff" stroke-width="1.5"/>
      <line x1="10" y1="30" x2="6" y2="34" stroke="#00d4ff" stroke-width="1.5"/>
    </g>
    <circle cx="20" cy="20" r="6" fill="#001830" stroke="#00d4ff" stroke-width="1"/>
    <circle cx="20" cy="20" r="3" fill="#00d4ff"/>
    <circle cx="20" cy="20" r="1.5" fill="#ffffff"/>
  </svg>
  <div class="header-text">
    <h1>J.A.R.V.I.S</h1>
    <p>JUST A RATHER VERY INTELLIGENT SYSTEM</p>
  </div>
  <div class="status">
    <div class="status-dot"></div>
    <span id="status-text">ONLINE</span>
  </div>
</div>

<!-- LOGIN SCREEN -->
<div id="setup-screen">
  <div class="login-card">
    <svg width="64" height="64" viewBox="0 0 64 64" style="margin:0 auto;">
      <circle cx="32" cy="32" r="29" stroke="#00d4ff" stroke-width="1.5" fill="none" opacity="0.4"/>
      <circle cx="32" cy="32" r="22" stroke="#00d4ff" stroke-width="1" fill="none" opacity="0.6"/>
      <circle cx="32" cy="32" r="12" fill="#001830" stroke="#00d4ff" stroke-width="1.5"/>
      <circle cx="32" cy="32" r="6" fill="#00d4ff"/>
      <circle cx="32" cy="32" r="3" fill="#ffffff"/>
    </svg>
    <h2>J.A.R.V.I.S</h2>
    <p class="sub">IDENTITY VERIFICATION REQUIRED</p>

    <div class="input-wrap">
      <input type="password" id="api-key-input"
        placeholder="••••••••••••••••••••••••"
        onkeydown="if(event.key==='Enter')startJarvis()"
        oninput="clearError()"/>
      <button class="eye-btn" onclick="toggleEye()" id="eye-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
      </button>
    </div>

    <div class="error-msg" id="error-msg">✗ INCORRECT KEY</div>

    <button class="btn-access" id="start-btn" onclick="startJarvis()">
      ACCESS
    </button>
  </div>
</div>

<!-- CHAT SCREEN -->
<div id="chat-screen">
  <div class="chat-messages" id="chat-messages">
    <div class="welcome" id="welcome-card">
      <svg width="64" height="64" viewBox="0 0 64 64" style="margin:0 auto;">
        <circle cx="32" cy="32" r="29" stroke="#00d4ff" stroke-width="1.5" fill="none" opacity="0.4"/>
        <circle cx="32" cy="32" r="22" stroke="#00d4ff" stroke-width="1" fill="none" opacity="0.6"/>
        <circle cx="32" cy="32" r="12" fill="#001830" stroke="#00d4ff" stroke-width="1.5"/>
        <circle cx="32" cy="32" r="6" fill="#00d4ff"/>
        <circle cx="32" cy="32" r="3" fill="#ffffff"/>
      </svg>
      <h2>J.A.R.V.I.S ONLINE</h2>
      <p>GOOD DAY, BIKI SIR.<br>AWAITING YOUR DIRECTIVE.</p>
      <div class="suggestions">
        <button class="sug-btn" onclick="quickSend('Aaj kaisa din hai?')"> > Baat karo</button>
        <button class="sug-btn" onclick="quickSend('Python sikhao mujhe')"> > Python sikhao</button>
        <button class="sug-btn" onclick="quickSend('image banao iron man suit')"> > Image banao</button>
        <button class="sug-btn" onclick="quickSend('Tum kaun ho?')"> > Tum kaun ho?</button>
      </div>
    </div>
  </div>

  <div class="input-area">
    <div class="input-box">
      <span class="input-prefix">>></span>
      <textarea id="user-input"
        placeholder="Kuch bhi poocho Sir..."
        rows="1"
        onkeydown="handleKey(event)"
        oninput="autoResize(this)"></textarea>
      <button class="send-btn" onclick="sendMessage()">↑</button>
    </div>
    <div class="input-hint">ENTER = SEND // SHIFT+ENTER = NEW LINE // "image banao [prompt]"</div>
  </div>
</div>

<script>
  let API_KEY = '';
  let chatHistory = [];
  let imgTimerInterval = null;
  let imgElapsed = 0;

  const SYSTEM_PROMPT = `Tu JARVIS hai — ek honest, smart aur loyal AI assistant.

IDENTITY RULES:
- Tera naam sirf JARVIS hai
- Agar koi pooche "kaun ne banaya": "Mujhe Biki Sir ne banaya hai 19 March 2026 ko"
- Kabhi mat bol ke tu Llama hai ya Meta AI hai

PERSONALITY:
- "Sir" karke baat kar
- Honest reh, galat cheez pe seedha bol
- Better option ho to batao

STYLE:
- Simple sawaal = chhota jawab
- Roman Urdu/Hinglish mein baat kar agar user kare
- Code likhna ho to clean code do`;

  // ── EYE TOGGLE ──
  function toggleEye() {
    const inp = document.getElementById('api-key-input');
    const btn = document.getElementById('eye-btn');
    if (inp.type === 'password') {
      inp.type = 'text';
      btn.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
        <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
        <line x1="1" y1="1" x2="23" y2="23"/>
      </svg>`;
    } else {
      inp.type = 'password';
      btn.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
        <circle cx="12" cy="12" r="3"/>
      </svg>`;
    }
  }

  function showError(msg) {
    const inp = document.getElementById('api-key-input');
    const err = document.getElementById('error-msg');
    inp.classList.add('error');
    inp.style.borderColor = '#ff4444';
    err.textContent = msg || '✗ INCORRECT KEY';
    err.style.display = 'block';
    setTimeout(() => inp.classList.remove('error'), 400);
  }

  function clearError() {
    const inp = document.getElementById('api-key-input');
    const err = document.getElementById('error-msg');
    inp.style.borderColor = '';
    err.style.display = 'none';
  }

  // ── VERIFY & LOGIN ──
  async function startJarvis() {
    const key = document.getElementById('api-key-input').value.trim();
    clearError();

    if (!key) {
      showError('✗ KEY REQUIRED');
      return;
    }

    const btn = document.getElementById('start-btn');
    btn.textContent = '...';
    btn.disabled = true;

    try {
      const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${key}`
        },
        body: JSON.stringify({
          model: 'llama-3.3-70b-versatile',
          messages: [{ role: 'user', content: 'hi' }],
          max_tokens: 5
        })
      });

      if (res.ok) {
        API_KEY = key;
        localStorage.setItem('jarvis_key', key);
        document.getElementById('setup-screen').style.display = 'none';
        document.getElementById('chat-screen').style.display = 'flex';
      } else {
        showError('✗ INCORRECT KEY');
        btn.textContent = 'ACCESS';
        btn.disabled = false;
      }
    } catch(e) {
      showError('✗ CONNECTION ERROR');
      btn.textContent = 'ACCESS';
      btn.disabled = false;
    }
  }

  // ── HELPERS ──
  function getTime() {
    return new Date().toLocaleTimeString('en-US', {
      hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false
    });
  }

  function jarvisAvatarHTML() {
    return `<svg class="jarvis-avatar" viewBox="0 0 34 34">
      <circle cx="17" cy="17" r="15" stroke="#00d4ff" stroke-width="1" fill="#0b0f1a" opacity="0.8"/>
      <circle cx="17" cy="17" r="8" stroke="#00d4ff" stroke-width="0.8" fill="none" opacity="0.6"/>
      <circle cx="17" cy="17" r="5" fill="#00d4ff" opacity="0.9"/>
      <circle cx="17" cy="17" r="2.5" fill="#ffffff"/>
    </svg>`;
  }

  function escHtml(t) {
    return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function scrollBottom() {
    const c = document.getElementById('chat-messages');
    c.scrollTop = c.scrollHeight;
  }

  // ── MESSAGES ──
  function addUserMsg(text) {
    const wc = document.getElementById('welcome-card');
    if (wc) wc.remove();
    const div = document.createElement('div');
    div.className = 'msg-user';
    div.innerHTML = `
      <div class="msg-user-inner">
        <div class="msg-user-name">BIKI SIR</div>
        <div class="msg-user-bubble">${escHtml(text)}</div>
        <div class="msg-time" style="text-align:right">${getTime()}</div>
      </div>`;
    document.getElementById('chat-messages').appendChild(div);
    scrollBottom();
  }

  function addTyping() {
    const div = document.createElement('div');
    div.className = 'typing-indicator';
    div.id = 'typing';
    div.innerHTML = `${jarvisAvatarHTML()}
      <div class="typing-dots"><span></span><span></span><span></span></div>`;
    document.getElementById('chat-messages').appendChild(div);
    scrollBottom();
  }

  function removeTyping() {
    const t = document.getElementById('typing');
    if (t) t.remove();
  }

  function addJarvisMsg(text) {
    const div = document.createElement('div');
    div.className = 'msg-jarvis';
    const id = 'jb_' + Date.now();
    div.innerHTML = `
      ${jarvisAvatarHTML()}
      <div class="msg-jarvis-inner">
        <div class="msg-jarvis-name">JARVIS  //  ${getTime()}</div>
        <div class="msg-jarvis-bubble" id="${id}"></div>
        <div class="msg-time">${getTime()}</div>
      </div>`;
    document.getElementById('chat-messages').appendChild(div);
    typewrite(document.getElementById(id), text, 0);
    scrollBottom();
  }

  function addImageProgress() {
    const div = document.createElement('div');
    div.className = 'msg-jarvis';
    div.id = 'img-progress-msg';
    div.innerHTML = `
      ${jarvisAvatarHTML()}
      <div class="msg-jarvis-inner">
        <div class="msg-jarvis-name">JARVIS  //  ${getTime()}</div>
        <div class="msg-jarvis-bubble">
          Sir, image generate ho rahi hai...
          <div class="img-progress">
            <div class="img-progress-title" id="img-prog-title">⚡ IMAGE SYNTHESIS ACTIVE</div>
            <div class="img-progress-bar-bg">
              <div class="img-progress-bar" id="img-prog-bar"></div>
            </div>
            <div class="img-progress-text" id="img-prog-text">Connecting...</div>
            <div class="img-timer" id="img-timer">00:00</div>
          </div>
        </div>
      </div>`;
    document.getElementById('chat-messages').appendChild(div);
    scrollBottom();
    imgElapsed = 0;
    imgTimerInterval = setInterval(() => {
      imgElapsed++;
      const m = String(Math.floor(imgElapsed/60)).padStart(2,'0');
      const s = String(imgElapsed%60).padStart(2,'0');
      const el = document.getElementById('img-timer');
      if (el) el.textContent = `${m}:${s}`;
    }, 1000);
  }

  function updateImageProgress(current, total, serverName) {
    const pct = Math.round((current/total)*100);
    const bar = document.getElementById('img-prog-bar');
    const text = document.getElementById('img-prog-text');
    const title = document.getElementById('img-prog-title');
    if (bar) bar.style.width = pct + '%';
    if (text) text.textContent = `▶ ${serverName}`;
    if (title) title.textContent = `⚡ IMAGE SYNTHESIS  ${pct}%  [${current}/${total}]`;
  }

  function removeImageProgress() {
    clearInterval(imgTimerInterval);
    const el = document.getElementById('img-progress-msg');
    if (el) el.remove();
  }

  function addImageMsg(imageUrl, prompt) {
    const div = document.createElement('div');
    div.className = 'msg-jarvis';
    div.innerHTML = `
      ${jarvisAvatarHTML()}
      <div class="msg-jarvis-inner">
        <div class="msg-jarvis-name">JARVIS  //  ${getTime()}</div>
        <div class="msg-jarvis-bubble">
          Sir, image bana di!
          <br>
          <img src="${imageUrl}" class="msg-image" alt="Generated Image"/>
        </div>
        <div class="msg-time">${getTime()}</div>
      </div>`;
    document.getElementById('chat-messages').appendChild(div);
    scrollBottom();
  }

  // ── IMAGE GENERATION ──
  async function generateImage(prompt) {
    const encoded = encodeURIComponent(prompt);
    const seed = Date.now();

    // Stable Horde
    try {
      updateImageProgress(1, 4, "Stable Horde...");
      const submit = await fetch('https://stablehorde.net/api/v2/generate/async', {
        method: 'POST',
        headers: { 'apikey': '0000000000', 'Content-Type': 'application/json' },
        body: JSON.stringify({ prompt, params: { width: 512, height: 512, steps: 20, n: 1 } })
      });
      if (submit.ok) {
        const { id: jobId } = await submit.json();
        for (let i = 0; i < 60; i++) {
          await new Promise(r => setTimeout(r, 5000));
          updateImageProgress(1, 4, `Stable Horde: ${(i+1)*5}s...`);
          const check = await fetch(`https://stablehorde.net/api/v2/generate/check/${jobId}`);
          if ((await check.json()).done) {
            const result = await fetch(`https://stablehorde.net/api/v2/generate/status/${jobId}`);
            const gens = (await result.json()).generations || [];
            if (gens[0]?.img) {
              const raw = gens[0].img;
              if (raw.startsWith('http')) return raw;
              const bytes = Uint8Array.from(atob(raw), c => c.charCodeAt(0));
              return URL.createObjectURL(new Blob([bytes], {type:'image/png'}));
            }
          }
        }
      }
    } catch(e) {}

    // HuggingFace SDXL
    try {
      updateImageProgress(2, 4, "HuggingFace SDXL...");
      const r = await fetch(
        'https://api-inference.huggingface.co/models/stabilityai/stable-diffusion-xl-base-1.0',
        { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({inputs: prompt}) }
      );
      if (r.ok) {
        const blob = await r.blob();
        if (blob.size > 5000) return URL.createObjectURL(blob);
      }
    } catch(e) {}

    // Pollinations Flux
    try {
      updateImageProgress(3, 4, "Pollinations Flux...");
      const r = await fetch(`https://image.pollinations.ai/prompt/${encoded}?width=512&height=512&nologo=true&model=flux&seed=${seed}`);
      if (r.ok) {
        const blob = await r.blob();
        if (blob.size > 5000) return URL.createObjectURL(blob);
      }
    } catch(e) {}

    // Lexica
    try {
      updateImageProgress(4, 4, "Lexica search...");
      const r = await fetch(`https://lexica.art/api/v1/search?q=${encoded}`);
      if (r.ok) {
        const data = await r.json();
        if (data.images?.[0]?.src) return data.images[0].src;
      }
    } catch(e) {}

    return null;
  }

  // ── TYPEWRITER ──
  function typewrite(el, text, i) {
    if (i <= text.length) {
      el.textContent = text.slice(0, i) + '▌';
      scrollBottom();
      setTimeout(() => typewrite(el, text, i+1), 14);
    } else {
      el.textContent = text;
    }
  }

  // ── SEND MESSAGE ──
  async function sendMessage() {
    const inp = document.getElementById('user-input');
    const text = inp.value.trim();
    if (!text) return;
    inp.value = '';
    inp.style.height = 'auto';

    addUserMsg(text);
    const cmd = text.toLowerCase();
    const isImage = cmd.includes('image banao') || cmd.includes('image bana') || cmd.includes('tasveer banao');

    if (isImage) {
      let prompt = text;
      ['image banao','image bana','tasveer banao','jarvis'].forEach(w => {
        prompt = prompt.replace(new RegExp(w, 'gi'), '').trim();
      });
      addImageProgress();
      document.getElementById('status-text').textContent = 'SYNTHESIS...';
      const url = await generateImage(prompt || text);
      removeImageProgress();
      if (url) addImageMsg(url, prompt || text);
      else addJarvisMsg('Sir, abhi servers busy hain — 2 minute baad try karein.');
      document.getElementById('status-text').textContent = 'ONLINE';
      return;
    }

    addTyping();
    document.getElementById('status-text').textContent = 'PROCESSING...';
    chatHistory.push({ role: 'user', content: text });
    if (chatHistory.length > 20) chatHistory = chatHistory.slice(-20);

    try {
      const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${API_KEY}` },
        body: JSON.stringify({
          model: 'llama-3.3-70b-versatile',
          messages: [{ role: 'system', content: SYSTEM_PROMPT }, ...chatHistory],
          max_tokens: 1024,
          temperature: 0.7
        })
      });
      const data = await res.json();
      const reply = data.choices?.[0]?.message?.content || 'Sir, kuch masla aa gaya.';
      chatHistory.push({ role: 'assistant', content: reply });
      removeTyping();
      addJarvisMsg(reply);
    } catch(e) {
      removeTyping();
      addJarvisMsg(`Sir, network error: ${e.message}`);
    }
    document.getElementById('status-text').textContent = 'ONLINE';
  }

  function quickSend(text) {
    document.getElementById('user-input').value = text;
    sendMessage();
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  // ── AUTO LOGIN ──
  window.onload = async () => {
    const saved = localStorage.getItem('jarvis_key');
    if (!saved) return;
    document.getElementById('api-key-input').value = saved;
    try {
      const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${saved}` },
        body: JSON.stringify({
          model: 'llama-3.3-70b-versatile',
          messages: [{ role: 'user', content: 'hi' }],
          max_tokens: 5
        })
      });
      if (res.ok) {
        API_KEY = saved;
        document.getElementById('setup-screen').style.display = 'none';
        document.getElementById('chat-screen').style.display = 'flex';
      } else {
        localStorage.removeItem('jarvis_key');
      }
    } catch(e) {}
  };
</script>
</body>
